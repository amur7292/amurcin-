<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AMUR - Кинопортал</title>
    
    <!-- === НАЧАЛО CSS-СТИЛЕЙ ДЛЯ ТВОЕГО ДИЗАЙНА === -->
    <style>
        /* 1. Настройка основного фона всего сайта */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            
            /* ФОН ЗДАНИЯ: Вставь сюда ссылку на свое изображение */
            background-image: url('ссылка_на_твое_изображение_здания.jpg'); 
            
            background-size: cover;          /* Фон растягивается на весь экран */
            background-position: center;      /* Фон по центру */
            background-attachment: fixed;    /* Фон не скроллится (как здание) */
            
            position: relative;              /* Для позиционирования логотипа */
            color: white;                    /* Текст на сайте будет светлым */
        }

        /* Затемнение фона для лучшей читаемости текста (рекомендуется) */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); /* Полупрозрачный черный слой */
            z-index: -1;
        }

        /* 2. МАЛЕНЬКОЕ ЛОГО "AMUR" В УГЛУ (стилизовано под надпись на здании) */
        .site-logo {
            position: fixed;
            top: 15px;
            left: 15px;
            font-size: 20px;
            font-weight: bold;
            color: #dcdcdc; /* Светло-серый, как бетон/металл */
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.7); /* Фон для видимости */
            padding: 5px 10px;
            border-radius: 4px;
            z-index: 100;
        }

        /* 3. ДИЗАЙН КОММЕНТАРИЕВ С "КОГТЯМИ" */
        #comments-list {
            margin-top: 20px;
            max-width: 600px;
        }

        .comment-item {
            position: relative; /* Чтобы когти были внутри коммента */
            background: rgba(20, 20, 20, 0.9); /* Темный фон коммента */
            border: 1px solid #444;
            color: #eee;
            padding: 15px 20px 15px 50px; /* Отступ слева для когтей */
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            overflow: hidden; /* Чтобы когти не вылезали за края */
        }

        /* ЭФФЕКТ КОГТЕЙ: Стилизация 'разреза' (можно улучшить, если вставить картинку когтей) */
        .comment-item::before {
            content: ''; 
            position: absolute;
            top: 10%;
            left: 10px;
            width: 30px; /* Ширина зоны когтей */
            height: 80%;
            
            /* ГРАДИЕНТ, имитирующий следы: вертикальные полосы */
            background: linear-gradient(90deg, 
                transparent 10%, 
                #ff4d4d 15%, /* Ярко-красный "разрез" */
                transparent 20%, 
                #ff4d4d 25%,
                transparent 30%, 
                #ff4d4d 35%,
                transparent 40%
            );
            
            opacity: 0.8;
            transform: rotate(-5deg); /* Немного наклона для динамики */
        }

        /* Стили заголовка коммента */
        .comment-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 5px;
        }
        
        .comment-header span:first-child {
            font-weight: bold;
            color: #ff9999; /* Имя комментатора выделено */
        }
    </style>
    <!-- === КОНЕЦ CSS-СТИЛЕЙ === -->
</head>
<body>

    <!-- 4. ДОБАВЛЯЕМ ЛОГОТИП НА СТРАНИЦУ -->
    <div class="site-logo">AMUR KINO</div>

    <!-- Твой HTML-каркас -->
    <input type="text" id="comment-name" placeholder="Твое имя">
    <textarea id="comment-text" placeholder="Твой комментарий"></textarea>
    <button onclick="addComment()">Отправить</button>

    <div id="comments-list"></div>

    <script>
        // Твой оригинальный JavaScript из "image.png" (без изменений)
        const currentMovieId = 'movie_1'; // Пример ID фильма
        const commentsList = document.getElementById('comments-list');

        function loadComments() {
            commentsList.innerHTML = '';
            const allComments = JSON.parse(localStorage.getItem('amur_comments')) || {};
            const movieComments = allComments[currentMovieId] || [];

            movieComments.forEach(c => {
                const item = document.createElement('div');
                item.classList.add('comment-item');
                
                // Исправил template literal: добавил класс для хидера
                item.innerHTML = `<div class="comment-header"><span>${c.name}</span><span>${c.date}</span></div><div>${c.text}</div>`;
                commentsList.appendChild(item);
            });
        }

        function addComment() {
            const nameInput = document.getElementById('comment-name');
            const textInput = document.getElementById('comment-text');

            const name = nameInput.value.trim();
            const text = textInput.value.trim();

            if (!name || !text) return;

            const allComments = JSON.parse(localStorage.getItem('amur_comments')) || {};

            if (!allComments[currentMovieId]) {
                allComments[currentMovieId] = [];
            }

            allComments[currentMovieId].push({
                name: name,
                text: text,
                date: new Date().toLocaleDateString() // Добавил дату
            });

            localStorage.setItem('amur_comments', JSON.stringify(allComments));

            nameInput.value = '';
            textInput.value = '';
            loadComments();
        }

        loadComments();
    </script>
</body>
</html>
