<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMUR Cinema</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0d0d0d; color: #e5e5e5; overflow-x: hidden; }
        header { background-color: #141414; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #ff6a00; box-shadow: 0 4px 20px rgba(255, 106, 0, 0.15); }
        .logo-container { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo { color: #ff6a00; font-size: 26px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 10px rgba(255, 106, 0, 0.5); }
        .tiger-icon { width: 30px; height: 30px; opacity: 0.9; }
        .search-container { display: flex; align-items: center; gap: 10px; width: 45%; }
        .search-container input { width: 100%; padding: 12px 20px; border-radius: 25px; border: 2px solid #ff6a00; background-color: #1a1a1a; color: white; font-size: 16px; outline: none; transition: 0.3s; }
        .search-container input:focus { box-shadow: 0 0 12px rgba(255, 106, 0, 0.6); }
        .search-container button { padding: 12px 25px; border-radius: 25px; border: none; background-color: #ff6a00; color: black; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .search-container button:hover { background-color: #ff8533; box-shadow: 0 0 15px #ff6a00; transform: scale(1.03); }
        select { background-color: #141414; color: #ff6a00; border: 2px solid #ff6a00; padding: 10px 15px; border-radius: 20px; cursor: pointer; outline: none; font-weight: bold; }
        main { padding: 40px 5%; position: relative; }
        main::before { content: ""; position: fixed; bottom: 20px; right: 20px; width: 150px; height: 150px; background-image: url('https://img.icons8.com/ios-filled/200/ff6a00/tiger.png'); background-size: contain; background-repeat: no-repeat; opacity: 0.04; pointer-events: none; z-index: -1; }
        .section-title { color: white; font-size: 26px; margin-bottom: 25px; border-left: 5px solid #ff6a00; padding-left: 15px; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
        .title-tiger { width: 24px; height: 24px; opacity: 0.8; }
        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; }
        .movie-card { background-color: #141414; border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.4s; border: 1px solid #222; }
        .movie-card:hover { transform: scale(1.04); box-shadow: 0 10px 20px rgba(255, 106, 0, 0.3); border-color: #ff6a00; }
        .movie-card img { width: 100%; height: 300px; object-fit: cover; }
        .movie-info { padding: 15px; background: linear-gradient(180deg, #141414 0%, #0a0a0a 100%); }
        .movie-title { font-size: 15px; font-weight: bold; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .movie-meta { display: flex; justify-content: space-between; font-size: 13px; color: #999; margin-top: 8px; }
        .rating { color: #ff6a00; font-weight: bold; }
        
        /* Исправленный Модальный Плеер с прокруткой */
        .player-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(5, 5, 5, 0.98); z-index: 1000; overflow-y: auto; padding: 40px 20px; }
        .player-wrapper { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .player-container { width: 90%; max-width: 1005px; height: 0; padding-bottom: 50.625%; position: relative; background-color: black; box-shadow: 0 0 30px rgba(255, 106, 0, 0.4); border-radius: 12px; overflow: hidden; border: 2px solid #ff6a00; }
        .player-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .close-btn { position: fixed; top: 20px; right: 35px; font-size: 45px; color: #999; cursor: pointer; transition: 0.3s; z-index: 1010; }
        .close-btn:hover { color: #ff6a00; transform: rotate(90deg); }
        .movie-details { margin-top: 25px; color: white; text-align: center; max-width: 850px; width: 100%; }
        .movie-details h2 { color: #ff6a00; font-size: 28px; margin-bottom: 12px; }
        .movie-details p { font-size: 16px; color: #bbb; line-height: 1.6; margin-bottom: 25px; }
        
        /* Стили Актеров */
        .cast-section { width: 100%; max-width: 850px; margin-top: 30px; border-top: 1px solid #222; padding-top: 20px; text-align: left; }
        .cast-title { color: #ff6a00; font-size: 20px; margin-bottom: 15px; text-transform: uppercase; }
        .cast-grid { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 10px; }
        .cast-card { flex: 0 0 110px; text-align: center; }
        .cast-card img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #ff6a00; margin-bottom: 8px; }
        .cast-name { font-size: 13px; color: white; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* Стили Комментариев */
        .comments-section { width: 100%; max-width: 850px; margin-top: 40px; border-top: 1px solid #222; padding-top: 20px; text-align: left; }
        .comments-title { color: #ff6a00; font-size: 20px; margin-bottom: 15px; text-transform: uppercase; }
        .comment-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
        .comment-form input, .comment-form textarea { background-color: #141414; border: 1px solid #ff6a00; border-radius: 8px; padding: 12px; color: white; outline: none; font-size: 15px; }
        .comment-form textarea { height: 80px; resize: none; }
        .comment-form button { background-color: #ff6a00; color: black; border: none; padding: 12px; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .comment-form button:hover { background-color: #ff8533; box-shadow: 0 0 10px #ff6a00; }
        .comments-list { display: flex; flex-direction: column; gap: 15px; }
        .comment-item { background-color: #141414; border-radius: 8px; padding: 15px; border-left: 4px solid #ff6a00; }
        .comment-header { display: flex; justify-content: space-between; font-size: 13px; color: #ff6a00; font-weight: bold; margin-bottom: 5px; }
        .comment-body { font-size: 14px; color: #e5e5e5; line-height: 1.4; }
        
        .rtl { direction: rtl; text-align: right; }
        .rtl .section-title { border-left: none; border-right: 5px solid #ff6a00; padding-right: 15px; }
        .rtl .cast-section, .rtl .comments-section { text-align: right; }
        .rtl .comment-item { border-left: none; border-right: 4px solid #ff6a00; }
    </style>
</head>
<body>
    <header id="header-bar">
        <div class="logo-container" onclick="loadTrending()">
            <img class="tiger-icon" src="https://img.icons8.com/ios-filled/50/ff6a00/tiger.png">
            <div class="logo">Amur Cinema</div>
        </div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Поиск фильмов...">
            <button id="search-btn">Найти</button>
        </div>
        <select id="lang-select">
            <option value="ru-RU">Русский (RU)</option>
            <option value="en-US">English (EN)</option>
            <option value="pt-BR">Português (BR)</option>
            <option value="ar-AE">العربية (AR)</option>
            <option value="es-ES">Español (ES)</option>
            <option value="fr-FR">Français (FR)</option>
            <option value="de-DE">Deutsch (DE)</option>
        </select>
    </header>
    
    <main id="main-content">
        <h2 class="section-title" id="grid-title">
            <img class="title-tiger" src="https://img.icons8.com/ios-filled/30/ff6a00/tiger.png">
            <span id="title-text">Популярные фильмы</span>
        </h2>
        <div class="movies-grid" id="movies-grid"></div>
    </main>

    <!-- Модальное окно плеера -->
    <div class="player-modal" id="player-modal">
        <span class="close-btn" onclick="closePlayer()">&times;</span>
        <div class="player-wrapper">
            <!-- Плеер без ломающего sandbox -->
            <div class="player-container">
                <iframe id="video-iframe" src="" allowfullscreen></iframe>
            </div>
            
            <div class="movie-details" id="movie-details"></div>
            
            <!-- Блок Актеров -->
            <div class="cast-section" id="cast-section">
                <h3 class="cast-title" id="cast-lbl">В главных ролях</h3>
                <div class="cast-grid" id="cast-grid"></div>
            </div>
            
            <!-- Блок Комментариев -->
            <div class="comments-section">
                <h3 class="comments-title" id="comments-lbl">Отзывы Гостей</h3>
                <div class="comment-form">
                    <input type="text" id="comment-name" placeholder="Ваше имя / Name" required>
                    <textarea id="comment-text" placeholder="Оставьте ваш отзыв о фильме... / Write a review..." required></textarea>
                    <button onclick="addComment()" id="comment-btn">Отправить</button>
                </div>
                <div class="comments-list" id="comments-list"></div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'e97f6ed5cfa53eb5fd94bcda452770b6'; 
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_URL = 'https://image.tmdb.org/t/p/w500';
        
        const moviesGrid = document.getElementById('movies-grid');
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const langSelect = document.getElementById('lang-select');
        const titleText = document.getElementById('title-text');
        const playerModal = document.getElementById('player-modal');
        const videoIframe = document.getElementById('video-iframe');
        const movieDetails = document.getElementById('movie-details');
        const castGrid = document.getElementById('cast-grid');
        const commentsList = document.getElementById('comments-list');
        const headerBar = document.getElementById('header-bar');
        const mainContent = document.getElementById('main-content');
        const playerModalDiv = document.getElementById('player-modal');
        
        let currentLanguage = langSelect.value;
        let currentMovieId = null;

        loadTrending();
        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });
        langSelect.addEventListener('change', (e) => { currentLanguage = e.target.value; updateInterfaceText(); loadTrending(); });

        const labels = {
            "ru": { cast: "В главных ролях", comm: "Отзывы Гостей", send: "Отправить" },
            "en": { cast: "Top Cast", comm: "Guest Reviews", send: "Submit" },
            "pt": { cast: "Elenco Principal", comm: "Comentários dos Hóspedes", send: "Enviar" },
            "ar": { cast: "طاقم العمل", comm: "آراء الضиوف", send: "إرسال" },
            "es": { cast: "Reparto Principal", comm: "Opiniones de los Huéspedes", send: "Enviar" },
            "fr": { cast: "Acteurs Principaux", comm: "Avis des Invités", send: "Soumettre" },
            "de": { cast: "Hauptdarsteller", comm: "Gastbewertungen", send: "Absenden" }
        };

        function updateInterfaceText() {
            const langKey = currentLanguage.substring(0,2);
            const currentLabels = labels[langKey] || labels["en"];
            document.getElementById('cast-lbl').innerText = currentLabels.cast;
            document.getElementById('comments-lbl').innerText = currentLabels.comm;
            document.getElementById('comment-btn').innerText = currentLabels.send;

            if(currentLanguage.startsWith('ar')) {
                headerBar.classList.add('rtl'); mainContent.classList.add('rtl'); playerModalDiv.classList.add('rtl');
                searchInput.placeholder = "بحث عن أفلام..."; searchBtn.innerText = "بحث"; titleText.innerText = "الأفلام الشائعة";
            } else {
                headerBar.classList.remove('rtl'); mainContent.classList.remove('rtl'); playerModalDiv.classList.remove('rtl');
                if(currentLanguage.startsWith('ru')) { searchInput.placeholder = "Поиск фильмов..."; searchBtn.innerText = "Найти"; titleText.innerText = "Популярные фильмы"; }
                else if(currentLanguage.startsWith('pt')) { searchInput.placeholder = "Pesquisar filmes..."; searchBtn.innerText = "Buscar"; titleText.innerText = "Filmes Populares"; }
                else if(currentLanguage.startsWith('es')) { searchInput.placeholder = "Buscar películas..."; searchBtn.innerText = "Buscar"; titleText.innerText = "Películas Populares"; }
                else if(currentLanguage.startsWith('fr')) { searchInput.placeholder = "Rechercher des films..."; searchBtn.innerText = "Chercher"; titleText.innerText = "Films Populaires"; }
                else if(currentLanguage.startsWith('de')) { searchInput.placeholder = "Filme suchen..."; searchBtn.innerText = "Suche"; titleText.innerText = "Beliebte Filme"; }
                else { searchInput.placeholder = "Search movies..."; searchBtn.innerText = "Search"; titleText.innerText = "Trending Movies"; }
            }
        }

        async function loadTrending() { fetchMovies(`${BASE_URL}/trending/movie/week?api_key=${API_KEY}&language=${currentLanguage}`); }
        
        async function performSearch() {
            const query = searchInput.value.trim(); if (!query) return;
            const prefixes = {"ar":"نتائج البحث عن: ","ru":"Результаты поиска: ","pt":"Resultados para: ","es":"Resultados de búsqueda: ","fr":"Résultats pour: ","de":"Suchergebnisse für: "};
            titleText.innerText = (prefixes[currentLanguage.substring(0,2)] || "Search results for: ") + `"${query}"`;
            fetchMovies(`${BASE_URL}/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=${currentLanguage}`);
        }

        async function fetchMovies(url) { const response = await fetch(url); const data = await response.json(); displayMovies(data.results); }
        
        function displayMovies(movies) {
            moviesGrid.innerHTML = '';
            if(!movies || movies.length === 0) { moviesGrid.innerHTML = `<p style="color:#ff6a00;grid-column:1/-1;text-align:center;font-weight:bold;">No results found</p>`; return; }
            movies.forEach(movie => {
                if (!movie.poster_path) return;
                const card = document.createElement('div'); card.classList.add('movie-card');
                card.innerHTML = `<img src="${IMG_URL + movie.poster_path}"><div class="movie-info"><div class="movie-title">${movie.title}</div><div class="movie-meta"><span>${movie.release_date?movie.release_date.split('-')[0]:'N/A'}</span><span class="rating">★ ${movie.vote_average.toFixed(1)}</span></div></div>`;
                card.addEventListener('click', () => openMovie(movie.id, movie.title, movie.overview));
                moviesGrid.appendChild(card);
            });
        }

        async function openMovie(movieId, title, overview) {
            currentMovieId = movieId;
            // Переключили на чистый и стабильный плеер vidsrc.me
            videoIframe.src = `https://vidsrc.me/embed/movie?tmdb=${movieId}`;
            movieDetails.innerHTML = `<h2>${title}</h2><p>${overview || ''}</p>`;
            
            // Загрузка актеров
            castGrid.innerHTML = '';
            try {
                const castRes = await fetch(`${BASE_URL}/movie/${movieId}/credits?api_key=${API_KEY}`);
                const castData = await castRes.json();
                castData.cast.slice(0, 6).forEach(actor => {
                    const img = actor.profile_path ? (IMG_URL + actor.profile_path) : 'https://img.icons8.com/ios-filled/100/333333/user-male-circle.png';
                    const actorCard = document.createElement('div');
                    actorCard.classList.add('cast-card');
                    actorCard.innerHTML = `<img src="${img}"><div class="cast-name">${actor.name}</div>`;
                    castGrid.appendChild(actorCard);
                });
            } catch(e) { console.error(e); }

            loadComments();
            playerModal.style.display = 'block';
            document.body.style.overflow = 'hidden'; 
        }

        function closePlayer() { playerModal.style.display = 'none'; videoIframe.src = ''; document.body.style.overflow = 'auto'; }

        // Логика комментариев
        function loadComments() {
            commentsList.innerHTML = '';
            const allComments = JSON.parse(localStorage.getItem('amur_comments') || '{}');
            const movieComments = allComments[currentMovieId] || [];
            movieComments.forEach(c => {
                const item = document.createElement('div');
                item.classList.add('comment-item');
                item.innerHTML = `<div class="comment-header"><span>${c.name}</span><span>${c.date}</span></div><div class="comment-body">${c.text}</div>`;
                commentsList.appendChild(item);
            });
        }

        function addComment() {
            const nameInput = document.getElementById('comment-name');
            const textInput = document.getElementById('comment-text');
            if(!nameInput.value.trim() || !textInput.value.trim()) return;

            const allComments = JSON.parse(localStorage.getItem('amur_comments') || '{}');
            if(!allComments[currentMovieId]) allComments[currentMovieId] = [];

            const date = new Date().toLocaleDateString();
            allComments[currentMovieId].push({ name: nameInput.value.trim(), text: textInput.value.trim(), date: date });
            localStorage.setItem('amur_comments', JSON.stringify(allComments));

            nameInput.value = ''; textInput.value = '';
            loadComments();
        }
    </script>
</body>
</html>
