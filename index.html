<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMUR Cinema</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0d0d0d; color: #e5e5e5; overflow-x: hidden; }
        header { background-color: #141414; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 2px solid #ff6a00; box-shadow: 0 4px 20px rgba(255, 106, 0, 0.15); }
        .logo-container { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo { color: #ff6a00; font-size: 26px; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 10px rgba(255, 106, 0, 0.5); }
        .tiger-icon { width: 30px; height: 30px; opacity: 0.9; }
        .search-container { display: flex; align-items: center; gap: 10px; width: 45%; }
        .search-container input { width: 100%; padding: 12px 20px; border-radius: 25px; border: 2px solid #ff6a00; background-color: #1a1a1a; color: white; font-size: 16px; outline: none; transition: 0.3s; }
        .search-container input:focus { box-shadow: 0 0 12px rgba(255, 106, 0, 0.6); }
        .search-container button { padding: 12px 25px; border-radius: 25px; border: none; background-color: #ff6a00; color: black; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .search-container button:hover { background-color: #ff8533; box-shadow: 0 0 15px #ff6a00; transform: scale(1.03); }
        select { background-color: #141414; color: #ff6a00; border: 2px solid #ff6a00; padding: 10px 15px; border-radius: 20px; cursor: pointer; outline: none; font-weight: bold; }
        main { padding: 40px 5%; position: relative; }
        main::before { content: ""; position: fixed; bottom: 20px; right: 20px; width: 150px; height: 150px; background-image: url('https://img.icons8.com/ios-filled/200/ff6a00/tiger.png'); background-size: contain; background-repeat: no-repeat; opacity: 0.04; pointer-events: none; z-index: -1; }
        .section-title { color: white; font-size: 26px; margin-bottom: 25px; border-left: 5px solid #ff6a00; padding-left: 15px; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
        .title-tiger { width: 24px; height: 24px; opacity: 0.8; }
        .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; }
        .movie-card { background-color: #141414; border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid #222; will-change: transform; }
        .movie-card:hover { border-color: #ff6a00; box-shadow: 0 5px 15px rgba(255, 106, 0, 0.2); }
        .movie-card img { width: 100%; height: 270px; object-fit: cover; }
        .movie-info { padding: 12px; background: linear-gradient(180deg, #141414 0%, #0a0a0a 100%); }
        .movie-title { font-size: 14px; font-weight: bold; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .movie-meta { display: flex; justify-content: space-between; font-size: 12px; color: #999; margin-top: 6px; }
        .rating { color: #ff6a00; font-weight: bold; }
        
        /* Модальное окно */
        .player-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(5, 5, 5, 0.98); z-index: 1000; overflow-y: auto; padding: 20px 10px; }
        .player-wrapper { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .player-container { width: 100%; max-width: 900px; height: 0; padding-bottom: 56.25%; position: relative; background-color: black; box-shadow: 0 0 30px rgba(255, 106, 0, 0.3); border-radius: 12px; overflow: hidden; border: 2px solid #ff6a00; }
        .player-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; background: #000; }
        .close-btn { position: fixed; top: 15px; right: 20px; font-size: 40px; color: #999; cursor: pointer; z-index: 1010; width: 45px; height: 45px; text-align: center; line-height: 40px; background: rgba(0,0,0,0.5); border-radius: 50%; }
        .close-btn:hover { color: #ff6a00; }
        
        /* Кнопки переключения серверов */
        .server-switcher { display: flex; gap: 15px; margin-top: 20px; width: 100%; max-width: 900px; justify-content: center; }
        .server-btn { padding: 10px 25px; border: 2px solid #ff6a00; background: transparent; color: #ff6a00; font-weight: bold; border-radius: 20px; cursor: pointer; transition: 0.2s; text-transform: uppercase; font-size: 13px; }
        .server-btn.active { background: #ff6a00; color: black; box-shadow: 0 0 10px rgba(255,106,0,0.4); }
        
        .movie-details { margin-top: 20px; color: white; text-align: center; max-width: 850px; width: 100%; }
        .movie-details h2 { color: #ff6a00; font-size: 24px; margin-bottom: 10px; }
        .movie-details p { font-size: 15px; color: #bbb; line-height: 1.5; margin-bottom: 20px; }
        
        .cast-section { width: 100%; max-width: 850px; margin-top: 25px; border-top: 1px solid #222; padding-top: 15px; text-align: left; }
        .cast-title { color: #ff6a00; font-size: 18px; margin-bottom: 12px; text-transform: uppercase; }
        .cast-grid { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 5px; }
        .cast-card { flex: 0 0 90px; text-align: center; }
        .cast-card img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 2px solid #ff6a00; margin-bottom: 6px; }
        .cast-name { font-size: 12px; color: white; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .comments-section { width: 100%; max-width: 850px; margin-top: 30px; border-top: 1px solid #222; padding-top: 15px; text-align: left; }
        .comments-title { color: #ff6a00; font-size: 18px; margin-bottom: 12px; text-transform: uppercase; }
        .comment-form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .comment-form input, .comment-form textarea { background-color: #141414; border: 1px solid #ff6a00; border-radius: 8px; padding: 10px; color: white; outline: none; font-size: 14px; }
        .comment-form textarea { height: 70px; resize: none; }
        .comment-form button { background-color: #ff6a00; color: black; border: none; padding: 10px; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        .comments-list { display: flex; flex-direction: column; gap: 10px; }
        .comment-item { background-color: #141414; border-radius: 8px; padding: 12px; border-left: 4px solid #ff6a00; }
        .comment-header { display: flex; justify-content: space-between; font-size: 12px; color: #ff6a00; font-weight: bold; margin-bottom: 4px; }
        .comment-body { font-size: 13px; color: #e5e5e5; }
        
        .rtl { direction: rtl; text-align: right; }
        .rtl .section-title { border-left: none; border-right: 5px solid #ff6a00; padding-right: 15px; }
        .rtl .cast-section, .rtl .comments-section { text-align: right; }
        .rtl .comment-item { border-left: none; border-right: 4px solid #ff6a00; }
    </style>
</head>
<body>
    <header id="header-bar">
        <div class="logo-container" onclick="loadTrending()">
            <img class="tiger-icon" src="https://img.icons8.com/ios-filled/50/ff6a00/tiger.png">
            <div class="logo">Amur Cinema</div>
        </div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Поиск фильмов...">
            <button id="search-btn">Найти</button>
        </div>
        <select id="lang-select">
            <option value="ru-RU">Русский (RU)</option>
            <option value="en-US">English (EN)</option>
            <option value="pt-BR">Português (BR)</option>
            <option value="ar-AE">العربية (AR)</option>
            <option value="es-ES">Español (ES)</option>
            <option value="fr-FR">Français (FR)</option>
            <option value="de-DE">Deutsch (DE)</option>
        </select>
    </header>
    
    <main id="main-content">
        <h2 class="section-title" id="grid-title">
            <img class="title-tiger" src="https://img.icons8.com/ios-filled/30/ff6a00/tiger.png">
            <span id="title-text">Популярные фильмы</span>
        </h2>
        <div class="movies-grid" id="movies-grid"></div>
    </main>

    <div class="player-modal" id="player-modal">
        <span class="close-btn" onclick="closePlayer()">&times;</span>
        <div class="player-wrapper">
            <div class="player-container">
                <iframe id="video-iframe" src="" allowfullscreen></iframe>
            </div>
            
            <div class="server-switcher">
                <button class="server-btn active" id="btn-srv1" onclick="switchServer(1)">Сервер 1</button>
                <button class="server-btn" id="btn-srv2" onclick="switchServer(2)">Сервер 2</button>
            </div>
            
            <div class="movie-details" id="movie-details"></div>
            
            <div class="cast-section" id="cast-section">
                <h3 class="cast-title" id="cast-lbl">В главных ролях</h3>
                <div class="cast-grid" id="cast-grid"></div>
            </div>
            
            <div class="comments-section">
                <h3 class="comments-title" id="comments-lbl">Отзывы Гостей</h3>
                <div class="comment-form">
                    <input type="text" id="comment-name" placeholder="Ваше имя / Name" required>
                    <textarea id="comment-text" placeholder="Оставьте ваш отзыв о фильме... / Write a review..." required></textarea>
                    <button onclick="addComment()" id="comment-btn">Отправить</button>
                </div>
                <div class="comments-list" id="comments-list"></div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'e97f6ed5cfa53eb5fd94bcda452770b6'; 
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMG_URL = 'https://image.tmdb.org/t/p/w300'; // Уменьшили размер картинок для скорости
        
        const moviesGrid = document.getElementById('movies-grid');
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const langSelect = document.getElementById('lang-select');
        const titleText = document.getElementById('title-text');
        const playerModal = document.getElementById('player-modal');
        const videoIframe = document.getElementById('video-iframe');
        const movieDetails = document.getElementById('movie-details');
        const castGrid = document.getElementById('cast-grid');
        const commentsList = document.getElementById('comments-list');
        
        let currentLanguage = langSelect.value;
        let currentMovieId = null;
        let activeServer = 1;

        loadTrending();
        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });
        langSelect.addEventListener('change', (e) => { currentLanguage = e.target.value; updateInterfaceText(); loadTrending(); });

        const labels = {
            "ru": { cast: "В главных ролях", comm: "Отзывы Гостей", send: "Отправить" },
            "en": { cast: "Top Cast", comm: "Guest Reviews", send: "Submit" },
            "pt": { cast: "Elenco Principal", comm: "Comentários", send: "Enviar" },
            "ar": { cast: "طاقم العمل", comm: "آراء الضيوف", send: "إرسال" },
            "es": { cast: "Reparto Principal", comm: "Opiniones", send: "Enviar" },
            "fr": { cast: "Acteurs Principaux", comm: "Avis", send: "Soumettre" },
            "de": { cast: "Hauptdarsteller", comm: "Gastbewertungen", send: "Absenden" }
        };

        function updateInterfaceText() {
            const langKey = currentLanguage.substring(0,2);
            const currentLabels = labels[langKey] || labels["en"];
            document.getElementById('cast-lbl').innerText = currentLabels.cast;
            document.getElementById('comments-lbl').innerText = currentLabels.comm;
            document.getElementById('comment-btn').innerText = currentLabels.send;

            if(currentLanguage.startsWith('ar')) {
                document.getElementById('header-bar').classList.add('rtl'); document.getElementById('main-content').classList.add('rtl'); document.getElementById('player-modal').classList.add('rtl');
                searchInput.placeholder = "بحث عن أفلام..."; searchBtn.innerText = "بحث"; titleText.innerText = "الأفلام الشائعة";
            } else {
                document.getElementById('header-bar').classList.remove('rtl'); document.getElementById('main-content').classList.remove('rtl'); document.getElementById('player-modal').classList.remove('rtl');
                if(currentLanguage.startsWith('ru')) { searchInput.placeholder = "Поиск фильмов..."; searchBtn.innerText = "Найти"; titleText.innerText = "Популярные фильмы"; }
                else { searchInput.placeholder = "Search movies..."; searchBtn.innerText = "Search"; titleText.innerText = "Trending Movies"; }
            }
        }

        async function loadTrending() { fetchMovies(`${BASE_URL}/trending/movie/week?api_key=${API_KEY}&language=${currentLanguage}`); }
        
        async function performSearch() {
            const query = searchInput.value.trim(); if (!query) return;
            fetchMovies(`${BASE_URL}/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(query)}&language=${currentLanguage}`);
        }

        async function fetchMovies(url) { const response = await fetch(url); const data = await response.json(); displayMovies(data.results); }
        
        function displayMovies(movies) {
            moviesGrid.innerHTML = '';
            if(!movies || movies.length === 0) return;
            movies.forEach(movie => {
                if (!movie.poster_path) return;
                const card = document.createElement('div'); card.classList.add('movie-card');
                card.innerHTML = `<img src="${IMG_URL + movie.poster_path}"><div class="movie-info"><div class="movie-title">${movie.title}</div><div class="movie-meta"><span>${movie.release_date?movie.release_date.split('-')[0]:''}</span><span class="rating">★ ${movie.vote_average.toFixed(1)}</span></div></div>`;
                card.addEventListener('click', () => openMovie(movie.id, movie.title, movie.overview));
                moviesGrid.appendChild(card);
            });
        }

        function setPlayerSrc() {
            if (activeServer === 1) {
                videoIframe.src = `https://vidsrc.me/embed/movie?tmdb=${currentMovieId}`;
            } else {
                videoIframe.src = `https://vidsrc.cc/vidsrc/movie/${currentMovieId}`;
            }
        }

        function switchServer(srvNum) {
            if (activeServer === srvNum) return;
            activeServer = srvNum;
            document.getElementById('btn-srv1').classList.toggle('active', srvNum === 1);
            document.getElementById('btn-srv2').classList.toggle('active', srvNum === 2);
            setPlayerSrc();
        }

        async function openMovie(movieId, title, overview) {
            currentMovieId = movieId;
            activeServer = 1;
            document.getElementById('btn-srv1').classList.add('active');
            document.getElementById('btn-srv2').classList.remove('active');
            
            setPlayerSrc();
            movieDetails.innerHTML = `<h2>${title}</h2><p>${overview || ''}</p>`;
            
            castGrid.innerHTML = '';
            try {
                const castRes = await fetch(`${BASE_URL}/movie/${movieId}/credits?api_key=${API_KEY}`);
                const castData = await castRes.json();
                castData.cast.slice(0, 6).forEach(actor => {
                    const img = actor.profile_path ? ('https://image.tmdb.org/t/p/w185' + actor.profile_path) : 'https://img.icons8.com/ios-filled/100/333333/user-male-circle.png';
                    const actorCard = document.createElement('div'); actorCard.classList.add('cast-card');
                    actorCard.innerHTML = `<img src="${img}"><div class="cast-name">${actor.name}</div>`;
                    castGrid.appendChild(actorCard);
                });
            } catch(e) {}

            loadComments();
            playerModal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closePlayer() {
            playerModal.style.display = 'none';
            videoIframe.removeAttribute('src'); // Мгновенно убиваем iframe из памяти, убирая лаги назад!
            videoIframe.src = ''; 
            document.body.style.overflow = 'auto';
        }

        function loadComments() {
            commentsList.innerHTML = '';
            const allComments = JSON.parse(localStorage.getItem('amur_comments') || '{}');
            const movieComments = allComments[currentMovieId] || [];
            movieComments.forEach(c => {
                const item = document.createElement('div'); item.classList.add('comment-item');
                item.innerHTML = `<div class="comment-header"><span>${c.name}</span><span>${c.date}</span></div><div class="comment-body">${c.text}</div>`;
                commentsList.appendChild(item);
            });
        }

        function addComment() {
            const nameInput = document.getElementById('comment-name'); const textInput = document.getElementById('comment-text');
            if(!nameInput.value.trim() || !textInput.value.trim()) return;
            const allComments = JSON.parse(localStorage.getItem('amur_comments') || '{}');
            if(!allComments[currentMovieId]) allComments[currentMovieId] = [];
            allComments[currentMovieId].push({ name: nameInput.value.trim(), text: textInput.value.trim(), date: new Date().toLocaleDateString() });
            localStorage.setItem('amur_comments', JSON.stringify(allComments));
            nameInput.value = ''; textInput.value = ''; loadComments();
        }
    </script>
</body>
</html>
